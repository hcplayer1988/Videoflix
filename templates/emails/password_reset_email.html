<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
  <title>Reset your Videoflix password</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style type="text/css">
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0 !important; padding: 0 !important; background-color: #f4f4f4; width: 100% !important; }
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; }
      .inner-td { padding: 30px 24px !important; }
      .btn-td { padding: 8px 0 24px !important; }
    }
    @media (prefers-color-scheme: dark) {
      .dark-bg { background-color: #1a1a2e !important; }
      .dark-card { background-color: #16213e !important; }
      .dark-text { color: #e0e0e0 !important; }
      .dark-footer { color: #aaaaaa !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;" class="dark-bg">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f4f4f4;" class="dark-bg">
    <tr>
      <td style="padding: 40px 20px;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="560" align="center" class="email-container" style="max-width: 560px; background-color: #ffffff; border-radius: 8px;">
          <tr>
            <td class="inner-td" style="padding: 40px 40px 32px 40px;">
 
              <!-- Logo -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="padding-bottom: 32px;">
                    <a href="{{ site_url }}" style="text-decoration: none; display: inline-block; color: inherit;">
                      <img src="{{ logo_url }}" width="160" height="26" alt="Videoflix" style="display: block; border: 0; height: auto; max-width: 160px;" />
                    </a>
                  </td>
                </tr>
              </table>
 
              <!-- Body text -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="font-family: Arial, Helvetica, sans-serif; font-size: 15px; line-height: 1.6; color: #333333; padding-bottom: 20px;" class="dark-text">
                    <span style="color: #333333 !important; font-family: Arial, Helvetica, sans-serif; font-size: 15px;">Dear {{ email }},<br />
                    We received a request to reset your Videoflix password. Click the button below to set a new password:</span>
                  </td>
                </tr>
              </table>
 
              <!-- Button -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" class="btn-td">
                <tr>
                  <td style="padding: 8px 0 28px;" class="btn-td">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word"
                      href="{{ reset_link }}"
                      style="height:48px; v-text-anchor:middle; width:200px;"
                      arcsize="50%" strokecolor="#3b3bdb" fillcolor="#3b3bdb">
                      <w:anchorlock/>
                      <center style="color:#ffffff; font-family:Arial,sans-serif; font-size:15px; font-weight:bold;">Reset password</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <a href="{{ reset_link }}"
                       style="background-color: #3b3bdb; color: #ffffff !important; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: bold; text-decoration: none; padding: 14px 28px; border-radius: 50px; display: inline-block; mso-padding-alt: 0; text-align: center; -webkit-text-size-adjust: none;"
                       target="_blank">
                      <span style="color: #ffffff !important; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: bold; text-decoration: none;">Reset password</span>
                    </a>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>
 
              <!-- Divider -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr><td style="border-top: 1px solid #eeeeee; padding-top: 20px;"></td></tr>
              </table>
 
              <!-- Footer -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 1.6; color: #555555; padding-bottom: 16px;" class="dark-footer">
                    <span style="color: #555555 !important; font-family: Arial, Helvetica, sans-serif; font-size: 14px;">If you did not request a password reset, please disregard this email.</span>
                  </td>
                </tr>
                <tr>
                  <td style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 1.6; color: #555555;" class="dark-footer">
                    <span style="color: #555555 !important; font-family: Arial, Helvetica, sans-serif; font-size: 14px;">Best regards,<br />Your Videoflix Team.</span>
                  </td>
                </tr>
              </table>
 
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
